[pytest]
# ─── Test discovery ───────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Output ──────────────────────────────────────────────
addopts =
    --tb=short
    -v
    --strict-markers
    --color=yes
    --no-header

# ─── Coverage (when run with pytest-cov) ─────────────────
# pytest --cov=. --cov-report=html
# (don't add --cov by default to keep basic runs fast)

# ─── Markers ─────────────────────────────────────────────
markers =
    unit: pure unit tests — no external services
    integration: requires running services (API, Redis, etc.)
    slow: tests that take >2 seconds

# ─── Asyncio ─────────────────────────────────────────────
asyncio_mode = auto

# ─── Log capturing ───────────────────────────────────────
log_cli = true
log_cli_level = WARNING
log_format = %(levelname)-8s %(name)s: %(message)s
